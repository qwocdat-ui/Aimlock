<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26.4 - Mua Gói Dự Đoán</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0A84FF;
            --ios-green: #32D74B;
            --ios-red: #FF453A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: var(--ios-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* Ví tiền phong cách Dynamic Island */
        .wallet-island {
            background: var(--ios-card);
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 320px;
            border: 1px solid #333;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-label { font-size: 12px; color: #8e8e93; }
        .balance-value { font-size: 22px; font-weight: 600; }

        /* Nút nạp tiền nhanh */
        .btn-add {
            background: var(--ios-green);
            border: none; color: white;
            padding: 8px 15px; border-radius: 15px;
            font-weight: bold; cursor: pointer;
        }

        /* Danh sách 4 gói */
        .package-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .card {
            background: var(--ios-card);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #2c2c2e;
        }

        .card h3 { margin: 10px 0; font-size: 16px; }
        .card .price { color: var(--ios-blue); font-weight: bold; margin-bottom: 15px; }

        .btn-buy {
            background: white;
            color: black;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-buy:active { opacity: 0.7; }

        /* Modal nạp tiền */
        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-box {
            background: #2c2c2e; padding: 25px; border-radius: 25px;
            width: 280px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 15px 0;
            border-radius: 10px; border: none; background: #3a3a3c; color: white;
            text-align: center; font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="wallet-island">
        <div>
            <div class="balance-label">SỐ DƯ CỦA BẠN</div>
            <div class="balance-value" id="moneyDisplay">0đ</div>
        </div>
        <button class="btn-add" onclick="toggleModal(true)">NẠP</button>
    </div>

    <div class="package-grid">
        <div class="card">
            <h3>Gói VIP 1</h3>
            <div class="price">50.000đ</div>
            <button class="btn-buy" onclick="handlePurchase('Gói VIP 1')">Mua Ngay</button>
        </div>
        <div class="card">
            <h3>Gói VIP 2</h3>
            <div class="price">50.000đ</div>
            <button class="btn-buy" onclick="handlePurchase('Gói VIP 2')">Mua Ngay</button>
        </div>
        <div class="card">
            <h3>Gói VIP 3</h3>
            <div class="price">50.000đ</div>
            <button class="btn-buy" onclick="handlePurchase('Gói VIP 3')">Mua Ngay</button>
        </div>
        <div class="card">
            <h3>Gói VIP 4</h3>
            <div class="price">50.000đ</div>
            <button class="btn-buy" onclick="handlePurchase('Gói VIP 4')">Mua Ngay</button>
        </div>
    </div>

    <div class="modal" id="modalNap">
        <div class="modal-box">
            <h3>Nạp Tiền</h3>
            <input type="number" id="inputNap" placeholder="Nhập số tiền">
            <button class="btn-buy" style="background: var(--ios-green); color: white;" onclick="processDeposit()">Xác Nhận</button>
            <p style="color: #8e8e93; cursor: pointer; margin-top: 15px;" onclick="toggleModal(false)">Đóng</p>
        </div>
    </div>

    <script>
        let balance = 0;
        const PACKAGE_PRICE = 50000;

        function toggleModal(show) {
            document.getElementById('modalNap').style.display = show ? 'flex' : 'none';
        }

        function processDeposit() {
            let amount = document.getElementById('inputNap').value;
            if (amount > 0) {
                balance += parseInt(amount);
                updateUI();
                toggleModal(false);
                document.getElementById('inputNap').value = '';
            }
        }

        function updateUI() {
            document.getElementById('moneyDisplay').innerText = balance.toLocaleString('vi-VN') + 'đ';
        }

        function handlePurchase(packageName) {
            if (balance >= PACKAGE_PRICE) {
                balance -= PACKAGE_PRICE;
                updateUI();
                alert('Thanh toán thành công ' + packageName + '! Đang chuyển hướng...');
                
                // Chuyển sang trang float.html sau 1 giây
                setTimeout(() => {
                    window.location.href = 'float.html';
                }, 1000);
            } else {
                alert('Số dư không đủ! Bạn cần ít nhất 50.000đ');
            }
        }
    </script>
</body>
</html>
