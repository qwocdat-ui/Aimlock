<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26.4 Predict Pro - Wallet</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --card-glass: rgba(255, 255, 255, 0.8);
            --ios-blue: #007AFF;
            --ios-green: #34C759;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: var(--ios-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thanh Ví Tiền iOS Style */
        .wallet-bar {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .balance-info h4 { margin: 0; color: #8e8e93; font-size: 12px; text-transform: uppercase; }
        .balance-amount { font-size: 24px; font-weight: 700; color: #1c1c1e; }

        .add-money-btn {
            background: var(--ios-green);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .add-money-btn:active { transform: scale(0.9); }

        /* Giao diện Gói (Grid) */
        .package-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .package-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        /* Popup Nạp Tiền (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: #f9f9f9;
        }

        .confirm-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 600;
            width: 100%;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="wallet-bar">
        <div class="balance-info">
            <h4>Số dư khả dụng</h4>
            <div class="balance-amount" id="balance">0đ</div>
        </div>
        <button class="add-money-btn" onclick="openModal()">+</button>
    </div>

    <div class="package-container">
        <div class="package-card">
            <h3>Gói Premium</h3>
            <p>Dự đoán chính xác 95%</p>
            <button class="confirm-btn">Mua ngay</button>
        </div>
    </div>

    <div class="modal" id="depositModal">
        <div class="modal-content">
            <h3>Nạp tiền vào tài khoản</h3>
            <p style="color: #667; font-size: 14px;">Nhập số tiền bạn muốn cộng thêm</p>
            <input type="number" id="amountInput" placeholder="VD: 500000">
            <button class="confirm-btn" onclick="addMoney()">Xác nhận nạp</button>
            <p onclick="closeModal()" style="margin-top: 15px; color: #888; cursor: pointer;">Hủy bỏ</p>
        </div>
    </div>

    <script>
        let currentBalance = 0;

        function openModal() {
            document.getElementById('depositModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('depositModal').style.display = 'none';
        }

        function addMoney() {
            const amount = document.getElementById('amountInput').value;
            if (amount > 0) {
                currentBalance += parseInt(amount);
                document.getElementById('balance').innerText = currentBalance.toLocaleString('vi-VN') + 'đ';
                alert('Đã cộng ' + parseInt(amount).toLocaleString('vi-VN') + 'đ thành công!');
                closeModal();
                document.getElementById('amountInput').value = '';
            } else {
                alert('Vui lòng nhập số tiền hợp lệ!');
            }
        }
    </script>
</body>
</html>
