<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Voting - VIP</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { var(--glass-bg): rgba(255, 255, 255, 0.05); var(--glass-border): rgba(255, 255, 255, 0.1); var(--ios-blue): #0A84FF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--ios-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bg-glow { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(10,132,255,0.4) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; top: -100px; left: -100px; z-index: -1; animation: float 10s infinite alternate; }
        .bg-glow-2 { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(142,68,255,0.3) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; bottom: -150px; right: -100px; z-index: -1; animation: float 8s infinite alternate-reverse; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .hero h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(90deg, #fff, #0A84FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .hero p { color: #aaa; max-width: 400px; line-height: 1.6; margin-bottom: 30px; }
        .scroll-down { font-size: 30px; color: #fff; animation: bounce 2s infinite; text-decoration: none; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(10px); } }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; }
        .section-title { font-size: 24px; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
        .candidate-list { display: flex; flex-direction: column; gap: 15px; }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; display: flex; align-items: center; opacity: 0; transform: translateY(50px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-panel.show { opacity: 1; transform: translateY(0); }
        .candidate-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid rgba(255,255,255,0.1); }
        .candidate-info { flex-grow: 1; }
        .candidate-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .vote-btn { background: rgba(10,132,255,0.15); color: var(--ios-blue); border: 1px solid var(--ios-blue); padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #banned-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #111; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; color: #FF453A; text-align: center; padding: 20px;}
        
        /* Box thông báo trạng thái user */
        #user-status-box { display: none; background: rgba(10, 132, 255, 0.1); border: 1px solid var(--ios-blue); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 30px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p style="color:#aaa;">Đang khởi tạo...</p></div>

    <div id="banned-screen">
        <i class="fas fa-ban" style="font-size: 60px; margin-bottom: 20px;"></i>
        <h2>TRUY CẬP BỊ TỪ CHỐI</h2>
        <p style="color:#aaa; margin-top:10px;">Thiết bị hoặc IP của bạn đã bị quản trị viên chặn.</p>
    </div>

    <div class="bg-glow"></div><div class="bg-glow-2"></div>

    <div class="hero">
        <h1>VOTING EVENT</h1>
        <p>Bình chọn cho gương mặt ấn tượng nhất. Mỗi người chỉ được vinh danh 1 lần duy nhất!</p>
        <a href="#vote-section" class="scroll-down"><i class="fas fa-chevron-down"></i></a>
    </div>

    <div class="container" id="vote-section">
        <div id="user-status-box">
            <span>Bạn đã vote với tên: <b id="my-current-name" style="color: var(--ios-blue); font-size: 18px;"></b></span>
            <br>
            <button id="btn-edit-name" onclick="editName()" style="margin-top: 10px; background: var(--ios-blue); color: white; border: none; padding: 8px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 13px;"><i class="fas fa-pen"></i> Sửa tên</button>
        </div>

        <div class="section-title">Bảng Xếp Hạng Trực Tiếp</div>
        <div class="candidate-list" id="voting-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let userIP = "Unknown";
        let userDevice = navigator.userAgent;

        async function initApp() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch(e) {}

            const safeIP = userIP.replace(/\./g, '_');

            db.ref('banned_ips/' + safeIP).once('value', snap => {
                if(snap.exists()) {
                    document.getElementById('banned-screen').style.display = 'flex';
                    document.getElementById('loader').style.display = 'none';
                    return; 
                }

                db.ref('visitors/' + safeIP).set({ ip: userIP, device: userDevice, time: new Date().toLocaleString('vi-VN') });
                
                loadCandidates();
                checkUserUI(); 
                
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                }, 800);
            });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('show'); });
        }, { threshold: 0.1 });

        function loadCandidates() {
            db.ref('candidates').on('value', snapshot => {
                const votingList = document.getElementById('voting-list');
                votingList.innerHTML = '';
                let candidates = [];
                snapshot.forEach(child => { candidates.push({ id: child.key, ...child.val() }); });
                candidates.sort((a, b) => b.votes - a.votes);

                candidates.forEach((cand, index) => {
                    const imgSource = cand.imageUrl || "https://ui-avatars.com/api/?name=" + encodeURIComponent(cand.name);
                    const card = document.createElement('div');
                    card.className = 'glass-panel';
                    card.innerHTML = `
                        <div style="font-size: 20px; font-weight: bold; width: 30px; color: #888; text-align: center;">#${index+1}</div>
                        <img src="${imgSource}" class="candidate-img">
                        <div class="candidate-info">
                            <div class="candidate-name">${cand.name}</div>
                            <div style="font-size: 14px; color: #888;"><i class="fas fa-heart" style="color:#FF453A;"></i> ${cand.votes} votes</div>
                        </div>
                        <button class="vote-btn" onclick="processVote('${cand.id}', '${cand.name}')">Vote</button>
                    `;
                    votingList.appendChild(card);
                    observer.observe(card);
                });
            });
        }

        function checkUserUI() {
            if(localStorage.getItem('has_voted')) {
                document.getElementById('user-status-box').style.display = 'block';
                document.getElementById('my-current-name').innerText = localStorage.getItem('my_raw_name');
                // Nút sửa tên luôn hiện, không bị ẩn nữa
            }
        }

        function processVote(candId, candName) {
            if(localStorage.getItem('has_voted')) {
                return alert("Bạn đã dùng thiết bị này để vote rồi! Kéo lên trên cùng để xem và sửa tên của bạn.");
            }

            const voterName = prompt(`Nhập Tên/Biệt danh của bạn để vote cho ${candName}:`);
            if(!voterName || voterName.trim() === "") return;

            const safeVoterName = voterName.trim().toLowerCase().replace(/[.#$\[\]]/g, '');

            db.ref('voted_names/' + safeVoterName).once('value', snap => {
                if(snap.exists()) {
                    alert("Tên này đã có người dùng. Vui lòng thêm số hoặc biệt danh khác!");
                } else {
                    db.ref('candidates/' + candId + '/votes').set(firebase.database.ServerValue.increment(1));
                    db.ref('voted_names/' + safeVoterName).set({ time: new Date().toLocaleString('vi-VN'), votedFor: candName });
                    
                    localStorage.setItem('has_voted', 'true');
                    localStorage.setItem('my_voted_name', safeVoterName); 
                    localStorage.setItem('my_raw_name', voterName.trim()); 
                    localStorage.setItem('voted_for_cand', candName); 
                    
                    alert(`Tuyệt vời! Đã ghi nhận vote từ ${voterName}.`);
                    if (navigator.vibrate) navigator.vibrate(50);
                    checkUserUI();
                }
            });
        }

        function editName() {
            const oldSafeName = localStorage.getItem('my_voted_name');
            const candName = localStorage.getItem('voted_for_cand');

            const newName = prompt("Nhập tên mới của bạn:");
            if(!newName || newName.trim() === "") return;

            const safeNewName = newName.trim().toLowerCase().replace(/[.#$\[\]]/g, '');
            if(safeNewName === oldSafeName) return alert("Tên mới y hệt tên cũ!");

            db.ref('voted_names/' + safeNewName).once('value', snap => {
                if(snap.exists()) {
                    alert("Tên mới này đã bị người khác giành mất! Vui lòng thử tên khác.");
                } else {
                    // Xóa tên cũ đi
                    db.ref('voted_names/' + oldSafeName).remove();
                    // Lưu tên mới vào
                    db.ref('voted_names/' + safeNewName).set({ time: new Date().toLocaleString('vi-VN'), votedFor: candName + " (Đã đổi tên)" });
                    
                    // Cập nhật lại kho lưu trữ của máy
                    localStorage.setItem('my_voted_name', safeNewName);
                    localStorage.setItem('my_raw_name', newName.trim());
                    // Đã xóa giới hạn 1 lần
                    
                    alert("Đổi tên thành công!");
                    checkUserUI();
                }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
