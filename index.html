<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IOS HACK CONCEPT v6.0</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(15, 15, 15, 0.9);
            --primary: #ff0000;
            --glow: 0 0 15px #ff0000, 0 0 30px rgba(255, 0, 0, 0.5);
            --text: #ffffff;
            --sub-text: #aaaaaa;
            --ios-blur: blur(25px);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Khung máy giả lập màn hình iOS */
        .iphone-screen {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            background: var(--bg);
            border: 2px solid #1a1a1a;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.8s var(--smooth);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Viền Neon Đỏ chạy quanh */
        .iphone-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 45px;
            border: 2px solid var(--primary);
            box-shadow: var(--glow);
            z-index: 10;
            pointer-events: none;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.9; }
            100% { opacity: 0.2; }
        }

        /* Header iOS */
        .status-bar {
            height: 44px;
            padding: 0 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            z-index: 12;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Thanh Notch giả lập */
        .notch {
            width: 180px;
            height: 25px;
            background: #000;
            border-radius: 0 0 15px 15px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 13;
        }

        /* Nội dung chính */
        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            padding-top: 55px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h1.app-title {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--primary);
            text-shadow: var(--glow);
            letter-spacing: 2px;
            text-align: center;
        }

        p.welcome {
            font-size: 12px;
            color: var(--sub-text);
            text-align: center;
            margin-top: -20px;
            margin-bottom: 10px;
        }

        /* Các mục lớn (Card) */
        .section-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 25px;
            padding: 20px;
            position: relative;
            transition: border-color 0.4s var(--smooth);
        }

        .section-card.active {
            border-color: var(--primary);
            box-shadow: inset 0 0 15px rgba(255,0,0,0.15);
        }

        h3.section-title {
            font-size: 16px;
            color: #eee;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Mô phỏng Tần số quét (Hz) */
        .hz-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .hz-option {
            padding: 10px 20px;
            border-radius: 12px;
            background: #151515;
            border: 1px solid #333;
            color: #ccc;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--smooth);
        }

        .hz-option.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .hz-option:active {
            transform: scale(0.92);
        }

        /* Mô phỏng Boost phần cứng */
        .boost-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .boost-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .boost-item label { font-size: 13px; color: #aaa; }
        
        /* Switch iOS giả lập */
        .ios-switch {
            width: 40px;
            height: 22px;
            background: #333;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .ios-switch .thumb {
            width: 18px;
            height: 18px;
            background: #666;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
        }

        .ios-switch.on { background: var(--primary); box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .ios-switch.on .thumb { transform: translateX(18px); background: #fff; }

        /* Bảng Menu 6 chức năng AIMLOCK chính */
        .aim-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 18px;
            transition: 0.3s;
            cursor: pointer;
        }

        .feature-item:active { transform: scale(0.95); }

        .feature-item span { font-size: 14px; font-weight: 700; color: #eee; }
        .feature-item .dot {
            width: 10px; height: 10px; background: #333; border-radius: 50%; transition: 0.3s;
        }

        .feature-item.on {
            border-color: var(--primary);
            box-shadow: inset 0 0 15px rgba(255,0,0,0.1);
        }
        .feature-item.on .dot {
            background: var(--primary);
            box-shadow: var(--glow);
        }

        /* Khu vực Inject và 100 chức năng */
        .inject-and-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .inject-box {
            text-align: center;
            border: 2px dashed #333;
            border-radius: 20px;
            padding: 20px;
        }

        input[type="file"] { display: none; }
        .file-label {
            display: inline-block;
            background: #111;
            padding: 10px 20px;
            border-radius: 12px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #222;
        }

        .btn-action {
            background: linear-gradient(45deg, #cc0000, #ff0000);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 15px;
            cursor: pointer;
            box-shadow: var(--glow);
            transition: 0.4s;
            margin-top: 15px;
        }

        .btn-action:active { transform: scale(0.98); }

        /* Danh sách 100 chức năng */
        .feature-list-box {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 10px;
        }

        .feature-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--sub-text);
            padding: 6px 0;
            border-bottom: 1px solid #111;
        }
        
        .feature-list-item input {
            accent-color: var(--primary);
        }

        /* Bottom Tab */
        .tab-bar {
            height: 80px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #1a1a1a;
            z-index: 12;
            margin-top: auto;
        }

        .tab-item { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .tab-item.active { opacity: 1; color: var(--primary); text-shadow: var(--glow); }
        
        /* Hiệu ứng Progress Bar */
        .progress-container {
            width: 100%; height: 6px; background: #111; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden;
        }

        #progress-fill { height: 100%; width: 0%; background: var(--primary); box-shadow: var(--glow); }

        /* Tùy chỉnh thanh cuộn iOS style */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="iphone-screen">
    <div class="notch"></div>
    <div class="status-bar">
        <span id="ios-time">09:41</span>
        <div style="display: flex; gap: 6px;">📶 🛜 🔋</div>
    </div>

    <div class="main-container">
        <h1 class="app-title">ULTRA INJECT</h1>
        <p class="welcome">Phiên bản Concept - Không can thiệp Game thật</p>

        <div class="section-card active">
            <h3 class="section-title">Hệ thống tối ưu</h3>
            <div class="hz-selector" style="margin-bottom: 20px;">
                <div class="hz-option active" onclick="setHz(this, 60)">60 Hz</div>
                <div class="hz-option" onclick="setHz(this, 90)">90 Hz</div>
                <div class="hz-option" onclick="setHz(this, 120)">120 Hz</div>
                <div class="hz-option" onclick="setHz(this, 144)">144 Hz</div>
            </div>
            <div class="boost-grid">
                <div class="boost-item">
                    <label>CPU Turbo</label>
                    <div class="ios-switch on" onclick="toggleSwitch(this)"> <div class="thumb"></div> </div>
                </div>
                <div class="boost-item">
                    <label>GPU Boost</label>
                    <div class="ios-switch on" onclick="toggleSwitch(this)"> <div class="thumb"></div> </div>
                </div>
                <div class="boost-item">
                    <label>RAM Cleaner</label>
                    <div class="ios-switch" onclick="toggleSwitch(this)"> <div class="thumb"></div> </div>
                </div>
                <div class="boost-item">
                    <label>Bypass Thermals</label>
                    <div class="ios-switch" onclick="toggleSwitch(this)"> <div class="thumb"></div> </div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <h3 class="section-title">Core functions (Menu #1)</h3>
            <div class="aim-menu">
                <div class="feature-item" onclick="toggleAim(this)"> <span>AIMLOCK 100%</span> <div class="dot"></div> </div>
                <div class="feature-item on" onclick="toggleAim(this)"> <span>AUTOHEADSHOT</span> <div class="dot"></div> </div>
                <div class="feature-item" onclick="toggleAim(this)"> <span>TRACKING AIM</span> <div class="dot"></div> </div>
                <div class="feature-item" onclick="toggleAim(this)"> <span>ANTENNA v2.0</span> <div class="dot"></div> </div>
                <div class="feature-item on" onclick="toggleAim(this)"> <span>RECOIL 0%</span> <div class="dot"></div> </div>
                <div class="feature-item" onclick="toggleAim(this)"> <span>WALLHACK v9.1</span> <div class="dot"></div> </div>
            </div>
        </div>

        <div class="section-card">
            <h3 class="section-title">Advanced hacks (Inject)</h3>
            <div class="inject-and-list">
                <div class="inject-box">
                    <label for="inject-file" class="file-label">Chọn File Config (.lua)</label>
                    <input type="file" id="inject-file">
                    <button class="btn-action" onclick="startInject()">ACTIVATE SYSTEM</button>
                    <div class="progress-container" id="p-container"> <div id="progress-fill"></div> </div>
                    <div id="status-text" style="font-size: 11px; margin-top: 12px; color: var(--primary); font-weight: bold;"></div>
                </div>

                <div class="feature-list-box" id="full-feature-list">
                    </div>
                <span style="font-size: 10px; color: var(--sub-text); text-align: center;">Và 90+ chức năng khác đang ẩn...</span>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active">💥</div>
        <div class="tab-item">💎</div>
        <div class="tab-item">🛡️</div>
        <div class="tab-item">⚙️</div>
    </nav>
</div>

<script>
    // Cập nhật giờ iOS
    function updateTime() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('ios-time').innerText = timeStr;
    }
    updateTime();
    setInterval(updateTime, 10000);

    // Hiệu ứng Switch iOS
    function toggleSwitch(el) {
        el.classList.toggle('on');
        hapticFeedback();
    }

    // Chọn tần số quét
    function setHz(el, hz) {
        const options = document.querySelectorAll('.hz-option');
        options.forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        hapticFeedback(20);
    }

    // Hiệu ứng bật tắt chức năng Aim
    function toggleAim(el) {
        el.classList.toggle('on');
        hapticFeedback(15);
    }

    // Giả lập Haptic Feedback (rung nhẹ)
    function hapticFeedback(ms = 10) {
        if (navigator.vibrate) navigator.vibrate(ms);
    }

    // Giả lập nạp 100 chức năng
    function generateFeatures() {
        const list = document.getElementById('full-feature-list');
        const hackNames = ["ESP Box", "Wallhack", "Fly Hack", "God Mode", "Speed Run", "Teleport", "Invisible", "Ghost v9", "Chams Color", "Damage Boost", "No Spread", "Fast Reload", "No Grass", "Wireframe", "Esp Skeleton", "Bypass Ban v11"];
        for (let i = 1; i <= 100; i++) {
            const nameIdx = Math.floor(Math.random() * hackNames.length);
            const name = hackNames[nameIdx] + " (v" + (Math.random()*10).toFixed(1) + ")";
            const itemHTML = `
                <div class="feature-list-item">
                    <input type="checkbox" id="hack_${i}">
                    <label for="hack_${i}">[#${i.toString().padStart(3, '0')}] ${name}</label>
                </div>`;
            list.insertAdjacentHTML('beforeend', itemHTML);
        }
    }
    generateFeatures();

    // Giả lập quá trình Inject file
    function startInject() {
        const btn = document.querySelector('.btn-action');
        const container = document.getElementById('p-container');
        const fill = document.getElementById('progress-fill');
        const status = document.getElementById('status-text');
        
        btn.style.display = "none";
        container.style.display = "block";
        
        let width = 0;
        const logs = [
            "> Starting...",
            "> Bypassing Cerberus...",
            "> Patching Mem (0x4a)...",
            "> Loading Lua v5.4...",
            "> Aimlock Active!",
            "> Enjoy!"
        ];

        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                status.innerText = "SUCCESSFULLY ACTIVATED!";
                hapticFeedback(100);
                setTimeout(() => {
                    alert("Kích hoạt thành công! Hãy vào Game ngay.");
                    location.reload();
                }, 800);
            } else {
                width += Math.random() * 5;
                if (width > 100) width = 100;
                fill.style.width = width + "%";
                let logIdx = Math.floor((width / 100) * logs.length);
                if(logs[logIdx]) status.innerText = logs[logIdx];
            }
        }, 90);
    }
</script>

</body>
</html>
