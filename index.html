<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảng Xếp Hạng Lớp</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #ebebf599;
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .header { padding: 50px 20px 30px; text-align: center; }
        .header h1 { font-size: 28px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .header p { color: var(--text-muted); font-size: 15px; margin-top: 5px; }
        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        .candidate-list { display: flex; flex-direction: column; gap: 15px; }
        .candidate-card { display: flex; align-items: center; padding: 15px; transition: transform 0.2s ease; }
        .candidate-card:active { transform: scale(0.97); }
        .candidate-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); margin-right: 15px; }
        .candidate-info { flex-grow: 1; }
        .candidate-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .candidate-votes { font-size: 14px; color: var(--text-muted); }
        .vote-btn { background: var(--ios-blue); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4); }
        .vote-btn:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BẢNG XẾP HẠNG</h1>
        <p>Bình chọn Những Thằng Ngu Nhất Hành Tinh</p>
    </div>
    <div class="container">
        <div class="candidate-list" id="voting-list">
            <div style="text-align:center; padding: 20px; color: var(--text-muted);">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>Đang tải dữ liệu...
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const candidatesRef = firebase.database().ref('candidates');

        candidatesRef.on('value', snapshot => {
            const votingList = document.getElementById('voting-list');
            votingList.innerHTML = '';
            let candidates = [];
            
            snapshot.forEach(child => {
                candidates.push({ id: child.key, ...child.val() });
            });
            candidates.sort((a, b) => b.votes - a.votes);

            if(candidates.length === 0) {
                votingList.innerHTML = `<div style="text-align:center; color:#888;">Chưa có dữ liệu.</div>`;
                return;
            }

            candidates.forEach(cand => {
                const defaultImg = "https://ui-avatars.com/api/?name=" + encodeURIComponent(cand.name) + "&background=random";
                const imgSource = cand.imageUrl ? cand.imageUrl : defaultImg;
                votingList.innerHTML += `
                    <div class="glass-panel candidate-card">
                        <img src="${imgSource}" class="candidate-img" onerror="this.src='${defaultImg}'">
                        <div class="candidate-info">
                            <div class="candidate-name">${cand.name}</div>
                            <div class="candidate-votes"><i class="fas fa-heart" style="color:var(--ios-red); font-size:12px;"></i> ${cand.votes} lượt vote</div>
                        </div>
                        <button class="vote-btn" onclick="vote('${cand.id}', ${cand.votes})">Vote</button>
                    </div>
                `;
            });
        });

        function vote(id, currentVotes) {
            candidatesRef.child(id).update({ votes: currentVotes + 1 });
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
