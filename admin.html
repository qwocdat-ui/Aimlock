<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Quản Lý Bầu Chọn</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #ebebf599;
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: linear-gradient(135deg, #2b1055 0%, #7597de 100%); color: var(--text-main); min-height: 100vh; padding-bottom: 40px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        .header { padding: 40px 20px 20px; text-align: center; }
        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        
        .admin-form { padding: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .ios-input { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .ios-input:focus { border-color: var(--ios-blue); }
        .btn-add { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .candidate-list { display: flex; flex-direction: column; gap: 10px; }
        .candidate-card { display: flex; align-items: center; padding: 10px 15px; }
        .candidate-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .candidate-info { flex-grow: 1; }
        .candidate-name { font-size: 16px; font-weight: 600; }
        .btn-delete { background: rgba(255, 69, 58, 0.2); color: var(--ios-red); border: 1px solid var(--ios-red); padding: 6px 12px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>QUẢN LÝ ỨNG VIÊN</h2>
        <p style="color: var(--text-muted); font-size: 14px;">Thêm mới hoặc Xóa</p>
    </div>
    <div class="container">
        <div class="glass-panel admin-form">
            <div class="input-group">
                <label>Tên ứng viên</label>
                <input type="text" id="cand-name" class="ios-input" placeholder="Nhập tên...">
            </div>
            <div class="input-group">
                <label>Link ảnh (URL)</label>
                <input type="text" id="cand-img" class="ios-input" placeholder="https://link-anh-cua-ban.jpg">
            </div>
            <button class="btn-add" onclick="addCandidate()">THÊM ỨNG VIÊN</button>
        </div>
        
        <h3 style="margin: 20px 0 10px; font-size: 16px;">Danh sách hiện tại:</h3>
        <div class="candidate-list" id="admin-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const candidatesRef = firebase.database().ref('candidates');

        candidatesRef.on('value', snapshot => {
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = '';
            
            snapshot.forEach(child => {
                const cand = { id: child.key, ...child.val() };
                const defaultImg = "https://ui-avatars.com/api/?name=" + encodeURIComponent(cand.name) + "&background=random";
                const imgSource = cand.imageUrl ? cand.imageUrl : defaultImg;
                
                adminList.innerHTML += `
                    <div class="glass-panel candidate-card">
                        <img src="${imgSource}" class="candidate-img" onerror="this.src='${defaultImg}'">
                        <div class="candidate-info">
                            <div class="candidate-name">${cand.name}</div>
                            <div style="font-size: 12px; color: #aaa;">${cand.votes} votes</div>
                        </div>
                        <button class="btn-delete" onclick="deleteCandidate('${cand.id}')">Xóa</button>
                    </div>
                `;
            });
        });

        function addCandidate() {
            const name = document.getElementById('cand-name').value.trim();
            const img = document.getElementById('cand-img').value.trim();
            if(!name) return alert("Vui lòng nhập tên!");

            candidatesRef.push({ name: name, imageUrl: img, votes: 0 }).then(() => {
                document.getElementById('cand-name').value = '';
                document.getElementById('cand-img').value = '';
                alert("Đã thêm thành công!");
            });
        }

        function deleteCandidate(id) {
            if(confirm("Xóa người này khỏi danh sách?")) {
                candidatesRef.child(id).remove();
            }
        }
    </script>
</body>
</html>
