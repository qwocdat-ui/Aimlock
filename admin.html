<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hệ Thống Bầu Chọn</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { var(--glass-bg): rgba(255,255,255,0.1); var(--ios-blue): #0A84FF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #1a1a2e; color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #0A84FF; }

        .glass-panel { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: none; }
        .glass-panel.active { display: block; }
        
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; margin-bottom: 15px; }
        .btn { width: 100%; background: #0A84FF; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .list-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }
        .btn-danger { background: #FF453A; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 12px;}
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; margin-bottom: 20px;">SYSTEM ADMIN</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-candidates')"><i class="fas fa-users"></i> Ứng Viên</button>
            <button class="tab-btn" onclick="switchTab('tab-security')"><i class="fas fa-shield-alt"></i> Quản Lý IP</button>
        </div>

        <div id="tab-candidates" class="glass-panel active">
            <input type="text" id="cand-name" placeholder="Tên ứng viên...">
            <input type="file" id="cand-file" accept="image/*" style="padding:0; background:none; border:none;" onchange="processImage(event)">
            <button class="btn" onclick="addCandidate()">Thêm Ứng Viên</button>
            
            <h3 style="margin-top: 20px;">Danh sách:</h3>
            <div id="admin-list" style="margin-top: 10px;"></div>
        </div>

        <div id="tab-security" class="glass-panel">
            <h3>Nhật ký truy cập gần đây:</h3>
            <div id="visitor-list" style="margin-top: 10px; max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://keyquocdat-default-rtdb.asia-southeast1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentBase64 = "";

        function switchTab(tabId) {
            document.querySelectorAll('.glass-panel').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- XỬ LÝ ỨNG VIÊN ---
        function processImage(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const scaleSize = 150 / img.width;
                    canvas.width = 150; canvas.height = img.height * scaleSize;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentBase64 = canvas.toDataURL('image/jpeg', 0.8);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function addCandidate() {
            const name = document.getElementById('cand-name').value;
            if(!name) return alert("Nhập tên!");
            db.ref('candidates').push({ name: name, imageUrl: currentBase64, votes: 0 }).then(() => {
                document.getElementById('cand-name').value = '';
                currentBase64 = ""; alert("Đã thêm!");
            });
        }

        db.ref('candidates').on('value', snapshot => {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            snapshot.forEach(child => {
                const c = { id: child.key, ...child.val() };
                list.innerHTML += `<div class="list-item"><b>${c.name}</b> (${c.votes} votes) <br><button class="btn-danger" onclick="db.ref('candidates/${c.id}').remove()">Xóa</button></div>`;
            });
        });

        // --- XỬ LÝ TRUY CẬP VÀ BAN IP ---
        db.ref('visitors').on('value', snapshot => {
            const list = document.getElementById('visitor-list');
            list.innerHTML = '';
            let visitors = [];
            snapshot.forEach(child => visitors.push(child.val()));
            
            // Hiện từ mới nhất đến cũ nhất
            visitors.reverse().forEach(v => {
                list.innerHTML += `
                    <div class="list-item">
                        <b style="color:var(--ios-blue)">IP: ${v.ip}</b> <br>
                        <span style="font-size:12px; color:#aaa;">Time: ${v.time}</span> <br>
                        <span style="font-size:11px; color:#888;">Device: ${v.device}</span> <br>
                        <button class="btn-danger" onclick="banIP('${v.ip}')"><i class="fas fa-ban"></i> Chặn IP Này</button>
                    </div>
                `;
            });
        });

        function banIP(ip) {
            if(confirm(`Bạn có chắc muốn chặn vĩnh viễn IP: ${ip}?`)) {
                const safeIP = ip.replace(/\./g, '_');
                db.ref('banned_ips/' + safeIP).set(true).then(() => {
                    alert("Đã khóa mõm IP này!");
                });
            }
        }
    </script>
</body>
</html>
