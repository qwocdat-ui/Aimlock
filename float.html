<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26.4 - Data Decryptor</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --glass: rgba(15, 15, 15, 0.95);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }

        #target-web { width: 100%; height: 100%; border: none; filter: brightness(0.5); transition: 0.5s; }

        /* Khung quét */
        #scanner-overlay {
            position: fixed; top: 25%; left: 50%; transform: translateX(-50%);
            width: 280px; height: 120px; border: 1px solid var(--ios-blue);
            display: none; z-index: 5;
        }
        .scan-line { width: 100%; height: 2px; background: var(--ios-blue); position: absolute; box-shadow: 0 0 15px var(--ios-blue); animation: scan 1.5s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Bảng điều khiển iOS */
        #control-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 340px; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; z-index: 10; font-family: -apple-system, sans-serif;
        }

        /* Console Log - Nơi dữ liệu nhảy */
        #console-data {
            background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px;
            height: 60px; overflow: hidden; font-family: monospace;
            font-size: 9px; color: #32D74B; margin-bottom: 10px; line-height: 1.2;
        }

        .result-box { text-align: center; margin-bottom: 15px; }
        #res-val { font-size: 40px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .btn-action {
            background: #fff; color: #000; border: none; width: 100%;
            padding: 14px; border-radius: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe id="target-web" src="https://bing.com"></iframe>

    <div id="scanner-overlay"><div class="scan-line"></div></div>

    <div id="control-panel">
        <div style="font-size: 10px; color: #8e8e93; margin-bottom: 8px;">AI DECRYPTOR v26.4</div>
        
        <div id="console-data">
            SYSTEM READY...<br>
            AWAITING COMMAND...
        </div>

        <div class="result-box">
            <div id="res-val">READY</div>
        </div>

        <button class="btn-action" onclick="runHack()">BẮT ĐẦU QUÉT</button>
    </div>

    <script>
        const logs = [
            "> Initializing pixel recognition...",
            "> Accessing iframe layer data...",
            "> Extracting MD5 hash string...",
            "> Comparing session history...",
            "> Analyzing bounce rate...",
            "> Calculation successful (98.4ms)",
            "> Finalizing prediction..."
        ];

        function runHack() {
            const consoleBox = document.getElementById('console-data');
            const resVal = document.getElementById('res-val');
            const scanner = document.getElementById('scanner-overlay');
            const web = document.getElementById('target-web');
            const btn = document.querySelector('.btn-action');

            // Reset & Bắt đầu
            btn.disabled = true;
            scanner.style.display = 'block';
            web.style.filter = "brightness(0.3) blur(2px)";
            resVal.innerText = "WAIT";
            resVal.style.color = "#fff";
            consoleBox.innerHTML = "";

            // Hiệu ứng chữ chạy (Console)
            let i = 0;
            const logInterval = setInterval(() => {
                if (i < logs.length) {
                    consoleBox.innerHTML += logs[i] + "<br>";
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                    i++;
                } else {
                    clearInterval(logInterval);
                    finishHack();
                }
            }, 400);

            function finishHack() {
                scanner.style.display = 'none';
                web.style.filter = "brightness(0.5)";
                
                const isTai = Math.random() > 0.5;
                resVal.innerText = isTai ? "TÀI" : "XỈU";
                resVal.style.color = isTai ? "var(--ios-red)" : "var(--ios-blue)";
                
                btn.disabled = false;
                btn.innerText = "QUÉT TIẾP PHIÊN MỚI";
            }
        }
    </script>
</body>
</html>
