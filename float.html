<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Analyzer MD5 Sync</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --glass: rgba(20, 20, 20, 0.95);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #target-web { width: 100%; height: 100%; border: none; }

        /* Hiệu ứng quét toàn màn hình */
        #scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--ios-blue); box-shadow: 0 0 20px var(--ios-blue);
            z-index: 999; display: none; pointer-events: none;
        }

        /* Bảng điều khiển */
        #main-tool {
            position: fixed; top: 20px; right: 20px;
            width: 280px; background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            color: white; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-bar { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px; color: #32D74B; }
        
        #console {
            background: #000; border-radius: 15px; padding: 10px;
            height: 70px; font-family: monospace; font-size: 10px; color: #32D74B;
            overflow: hidden; margin-bottom: 15px; border: 1px solid #333;
        }

        .display-area { text-align: center; padding: 10px 0; border-top: 1px solid #333; }
        #res-val { font-size: 48px; font-weight: 900; letter-spacing: 2px; }
        
        /* Progress bar đồng bộ thời gian */
        .timer-track { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 15px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--ios-blue); transition: width 1s linear; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-off { background: #3a3a3c; color: white; }
        .btn-on { background: white; color: black; }
    </style>
</head>
<body>

    <iframe id="target-web" src="https://play.xoc88.cc/?code=null"></iframe>
    <div id="scanner-line"></div>

    <div id="main-tool">
        <div class="status-bar">
            <span>● LIVE SYNC ACTIVE</span>
            <span id="session-tag" style="color:#8e8e93">PHIÊN: #82931</span>
        </div>

        <div id="console">Initializing neural link...</div>

        <div class="display-area">
            <div id="res-val" style="color: #444;">WAIT</div>
            <div id="timer-text" style="font-size: 12px; color: #8e8e93;">Đang chờ phiên mới: 60s</div>
        </div>

        <div class="timer-track">
            <div id="timer-bar"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-off" onclick="toggleAuto()">TỰ ĐỘNG: <span id="auto-status">TẮT</span></button>
            <button class="btn btn-on" onclick="manualScan()">QUÉT NGAY</button>
        </div>
    </div>

    <script>
        let timeLeft = 60;
        let isAuto = false;
        let sessionId = 82931;

        // 1. Đồng bộ thời gian thực 1 giây/lần
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) {
                timeLeft = 60; // Reset phiên mới
                sessionId++;
                document.getElementById('session-tag').innerText = "PHIÊN: #" + sessionId;
                if(isAuto) manualScan(); // Tự động quét khi sang giây 60
            }

            // Cập nhật giao diện
            document.getElementById('timer-text').innerText = `Đang chờ phiên mới: ${timeLeft}s`;
            document.getElementById('timer-bar').style.width = (timeLeft / 60 * 100) + "%";
            
            // Màu sắc thanh thời gian
            if (timeLeft <= 10) document.getElementById('timer-bar').style.background = "#FF453A";
            else document.getElementById('timer-bar').style.background = "#0A84FF";

            // Dữ liệu console chạy ngẫu nhiên mô phỏng "đọc màn hình"
            updateConsole();
        }, 1000);

        function updateConsole() {
            const logs = [
                `> Scanning Frame 0x${Math.random().toString(16).substr(2,4)}`,
                `> MD5 Hash: ${Math.random().toString(36).substr(2,10)}`,
                `> Decoding pixel data at [${Math.floor(Math.random()*100)},${Math.floor(Math.random()*100)}]`,
                `> Packet received: ${Math.floor(Math.random()*1024)}kb`
            ];
            const consoleBox = document.getElementById('console');
            consoleBox.innerHTML += `<div>${logs[Math.floor(Math.random()*logs.length)]}</div>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto-status').innerText = isAuto ? "BẬT" : "TẮT";
            document.getElementById('auto-status').style.color = isAuto ? "#32D74B" : "white";
        }

        function manualScan() {
            const line = document.getElementById('scanner-line');
            const res = document.getElementById('res-val');
            
            line.style.display = 'block';
            line.animate([{ top: '0%' }, { top: '100%' }], { duration: 1500, iterations: 1 });

            setTimeout(() => {
                line.style.display = 'none';
                const win = Math.random() > 0.5;
                res.innerText = win ? "TÀI" : "XỈU";
                res.style.color = win ? "var(--ios-red)" : "var(--ios-blue)";
                res.style.textShadow = `0 0 20px ${win ? 'rgba(255,69,58,0.5)' : 'rgba(10,132,255,0.5)'}`;
            }, 1500);
        }
    </script>
</body>
</html>
