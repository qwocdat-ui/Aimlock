<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass AI Analyzer</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --ios-dark: #1c1c1e;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #target-web { width: 100%; height: 100%; border: none; filter: brightness(0.8); }

        /* --- BONG BÓNG (LIQUID GLASS) --- */
        #bubble {
            position: fixed; top: 100px; left: 20px;
            width: 55px; height: 55px;
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 50%; z-index: 10000;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            touch-action: none; cursor: grab;
        }
        #bubble:active { cursor: grabbing; transform: scale(0.95); }

        /* --- BẢNG MENU (LIQUID GLASS) --- */
        #liquid-panel {
            position: fixed; top: 15vh; left: 5vw; width: 90vw; max-width: 320px;
            background: rgba(20, 20, 25, 0.45);
            backdrop-filter: blur(40px) saturate(250%);
            -webkit-backdrop-filter: blur(40px) saturate(250%);
            border-radius: 35px; padding: 25px 20px; color: white;
            z-index: 9999; display: none; touch-action: none;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; pointer-events: none; }
        .title { font-size: 13px; font-weight: 800; letter-spacing: 1px; background: linear-gradient(90deg, #fff, #8e8e93); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* KHU VỰC NHẬP CẦU */
        .input-section { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .input-label { font-size: 11px; color: #8e8e93; text-align: center; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; }
        
        .slots-container { display: flex; justify-content: space-between; gap: 8px; }
        .slot {
            flex: 1; height: 45px; border-radius: 14px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            color: #8e8e93; font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s; user-select: none;
        }
        .slot.tai { background: rgba(255, 69, 58, 0.2); color: var(--ios-red); border-color: rgba(255, 69, 58, 0.5); }
        .slot.xiu { background: rgba(10, 132, 255, 0.2); color: var(--ios-blue); border-color: rgba(10, 132, 255, 0.5); }
        .slot:active { transform: scale(0.9); }

        /* KHU VỰC KẾT QUẢ AI */
        .result-section { margin-top: 20px; text-align: center; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
        .res-text { font-size: 45px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,255,255,0.2); display: none; }
        .res-rate { font-size: 13px; color: #32D74B; font-weight: bold; margin-top: 5px; display: none; }
        .loading { font-size: 12px; color: #8e8e93; font-style: italic; display: none; }

        /* BUTTONS */
        .btn { width: 100%; padding: 15px; border-radius: 20px; border: none; font-weight: 800; font-size: 14px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .btn-analyze { background: linear-gradient(135deg, #e6e6e6, #ffffff); color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-analyze:active { transform: scale(0.96); }
        .btn-hide { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <iframe id="target-web" src="https://play.tik88.live/#ath"></iframe>

    <div id="bubble">
        <img src="https://cdn-icons-png.flaticon.com/512/2115/2115916.png" width="28" style="filter: invert(1); opacity: 0.9;">
    </div>

    <div id="liquid-panel">
        <div class="header">
            <div class="title">AI LIQUID ENGINE v26.4</div>
            <div style="width: 8px; height: 8px; background: #32D74B; border-radius: 50%; box-shadow: 0 0 8px #32D74B;"></div>
        </div>

        <div class="input-section">
            <div class="input-label">Chạm để chọn 3 kết quả gần nhất</div>
            <div class="slots-container">
                <div class="slot" onclick="toggleSlot(this)">-</div>
                <div class="slot" onclick="toggleSlot(this)">-</div>
                <div class="slot" onclick="toggleSlot(this)">-</div>
            </div>
        </div>

        <div class="result-section">
            <div class="loading" id="loading-txt">AI đang tính toán thuật toán...</div>
            <div class="res-text" id="final-res">TÀI</div>
            <div class="res-rate" id="final-rate">Tỉ lệ ra: 92%</div>
        </div>

        <button class="btn btn-analyze" onclick="startAnalysis()">PHÂN TÍCH KẾT QUẢ</button>
        <button class="btn btn-hide" onclick="toggleUI(false)">THU NHỎ BONG BÓNG</button>
    </div>

    <script>
        const panel = document.getElementById('liquid-panel');
        const bubble = document.getElementById('bubble');

        // 1. Logic Đổi Trạng Thái Nút (Trống -> Tài -> Xỉu -> Trống)
        function toggleSlot(el) {
            if (el.innerText === "-") {
                el.innerText = "TÀI";
                el.className = "slot tai";
            } else if (el.innerText === "TÀI") {
                el.innerText = "XỈU";
                el.className = "slot xiu";
            } else {
                el.innerText = "-";
                el.className = "slot";
            }
            // Ẩn kết quả cũ khi người dùng thay đổi cầu
            document.getElementById('final-res').style.display = 'none';
            document.getElementById('final-rate').style.display = 'none';
        }

        // 2. Logic AI Phân Tích Giả Lập
        function startAnalysis() {
            const slots = document.querySelectorAll('.slot');
            let isFilled = true;
            slots.forEach(slot => { if(slot.innerText === "-") isFilled = false; });

            if (!isFilled) {
                alert("Vui lòng nhập đủ 3 kết quả gần nhất để AI phân tích!");
                return;
            }

            // Hiện loading
            document.getElementById('final-res').style.display = 'none';
            document.getElementById('final-rate').style.display = 'none';
            document.getElementById('loading-txt').style.display = 'block';

            // Xử lý sau 1.5 giây
            setTimeout(() => {
                document.getElementById('loading-txt').style.display = 'none';
                
                // Random ra Tài hoặc Xỉu
                const isTai = Math.random() > 0.5;
                const resEl = document.getElementById('final-res');
                resEl.innerText = isTai ? "TÀI" : "XỈU";
                resEl.style.color = isTai ? "var(--ios-red)" : "var(--ios-blue)";
                resEl.style.textShadow = isTai ? "0 0 20px rgba(255,69,58,0.4)" : "0 0 20px rgba(10,132,255,0.4)";
                
                // Tỉ lệ từ 80% đến 98%
                document.getElementById('final-rate').innerText = "Độ chính xác: " + (Math.floor(Math.random() * 19) + 80) + "%";
                
                resEl.style.display = 'block';
                document.getElementById('final-rate').style.display = 'block';
            }, 1500);
        }

        // 3. Đóng mở Menu
        function toggleUI(showPanel) {
            if(showPanel) {
                panel.style.display = 'block';
                bubble.style.display = 'none';
            } else {
                panel.style.display = 'none';
                bubble.style.display = 'flex';
                // Đặt bong bóng ở vị trí gần menu vừa đóng
                bubble.style.top = panel.offsetTop + 'px';
                bubble.style.left = panel.offsetLeft + 'px';
            }
        }
        bubble.addEventListener('touchstart', (e) => { 
            // Phân biệt chạm click và kéo thả (chỉ mở nếu thả ra mà không di chuyển xa)
            toggleUI(true); 
        });

        // 4. Kéo thả siêu mượt cho Điện thoại (Touch) & Máy tính (Mouse)
        function makeDraggable(el) {
            let startX, startY, origX, origY, isDragging = false;

            // Dành cho điện thoại (Touch)
            el.addEventListener('touchstart', (e) => {
                isDragging = false;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                origX = el.offsetLeft; origY = el.offsetTop;
            });
            el.addEventListener('touchmove', (e) => {
                isDragging = true;
                e.preventDefault(); // Ngăn cuộn trang web bên dưới
                el.style.left = (origX + e.touches[0].clientX - startX) + 'px';
                el.style.top = (origY + e.touches[0].clientY - startY) + 'px';
            }, { passive: false });

            // Dành cho máy tính (Mouse) để bạn dễ test
            el.addEventListener('mousedown', (e) => {
                startX = e.clientX; startY = e.clientY;
                origX = el.offsetLeft; origY = el.offsetTop;
                document.onmousemove = (e) => {
                    el.style.left = (origX + e.clientX - startX) + 'px';
                    el.style.top = (origY + e.clientY - startY) + 'px';
                };
                document.onmouseup = () => { document.onmousemove = null; };
            });
        }
        makeDraggable(bubble);
        makeDraggable(panel);
        
        // Mặc định ẩn bảng, hiện bong bóng
        toggleUI(false);
    </script>
</body>
</html>
