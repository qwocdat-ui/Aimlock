<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOC88 ADMIN GHOST</title>
    <style>
        :root { --ios-blue: #0A84FF; --ios-red: #FF453A; --glass: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #target-web { width: 100%; height: 100%; border: none; }

        /* BONG BÓNG MESSENGER */
        #bubble {
            position: fixed; top: 100px; left: 20px;
            width: 55px; height: 55px; background: var(--ios-blue);
            border-radius: 50%; z-index: 10000; border: 2px solid white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); touch-action: none;
        }

        /* BẢNG ĐIỀU KHIỂN ADMIN */
        #admin-panel {
            position: fixed; top: 150px; left: 20px;
            width: 320px; background: var(--glass); border-radius: 30px;
            padding: 20px; color: white; z-index: 9999; display: none;
            border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            touch-action: none;
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 15px; pointer-events: none; }
        .monitor { background: #000; border-radius: 20px; padding: 15px; border: 1px solid #333; pointer-events: none; }
        .session-id { font-family: monospace; font-size: 11px; color: #8e8e93; }
        .prediction { font-size: 50px; font-weight: 900; text-align: center; margin: 10px 0; letter-spacing: 5px; }

        /* THANH ĐỒNG BỘ */
        .sync-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .s-btn { background: #2c2c2e; color: #fff; border: none; padding: 8px; border-radius: 10px; font-size: 10px; }
        
        .main-btn { background: #fff; color: #000; border: none; width: 100%; padding: 14px; border-radius: 18px; font-weight: bold; margin-top: 15px; }
        .ghost-btn { background: var(--ios-red); color: white; margin-top: 8px; }

        /* HIỆU ỨNG QUÉT TOÀN MÀN HÌNH */
        #scan-layer { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: var(--ios-blue); display: none; z-index: 10001; box-shadow: 0 0 20px var(--ios-blue); }
    </style>
</head>
<body>

    <iframe id="target-web" src="https://play.xoc88.cc/?code=null"></iframe>
    <div id="scan-layer"></div>

    <div id="bubble"><img src="https://cdn-icons-png.flaticon.com/512/3039/3039462.png" width="30" style="filter: invert(1);"></div>

    <div id="admin-panel">
        <div class="header">
            <b style="font-size: 13px; color: #32D74B;">● XOC88 LIVE SYNC</b>
            <span style="font-size: 10px; color: #666;">ADMIN v26.4</span>
        </div>

        <div class="monitor">
            <div class="session-id">
                API: api.xoc88.com/v1/stream<br>
                ID: #<span id="phiên">829442</span> | <span id="giây">60</span>s
            </div>
            <div class="prediction" id="kq">---</div>
            <div id="log" style="font-size: 9px; color: #32D74B; text-align: center; font-family: monospace;">Awaiting Data...</div>
        </div>

        <div class="sync-box">
            <button class="s-btn" onclick="adjT(1)">+1 Giây</button>
            <button class="s-btn" onclick="adjT(-1)">-1 Giây</button>
            <button class="s-btn" onclick="adjS(1)">+1 Phiên</button>
        </div>

        <button class="main-btn" onclick="autoScan()">BẮT ĐẦU QUÉT TỰ ĐỘNG (1S)</button>
        <button class="main-btn ghost-btn" onclick="hideAll()">THU NHỎ (GHOST MODE)</button>
    </div>

    <script>
        let s = 829442, t = 60, isAuto = false;
        const panel = document.getElementById('admin-panel'), bubble = document.getElementById('bubble');

        // CHẠY THỜI GIAN
        setInterval(() => {
            t--;
            if(t < 0) { t = 60; s++; }
            document.getElementById('giây').innerText = t;
            document.getElementById('phiên').innerText = s;
            
            // Nếu đang bật tự động quét mỗi giây
            if(isAuto) {
                document.getElementById('log').innerText = `> READING SCREEN PIXELS: SESSION #${s} [${t}s]`;
            }
        }, 1000);

        function adjT(v) { t += v; }
        function adjS(v) { s += v; }

        function autoScan() {
            isAuto = true;
            const layer = document.getElementById('scan-layer');
            layer.style.display = 'block';
            layer.animate([{top: '0%'}, {top: '100%'}], {duration: 2000, iterations: Infinity});
            
            // Giả lập trả kết quả sau khi "đọc" được mã phiên
            setTimeout(() => {
                const res = Math.random() > 0.5 ? "TÀI" : "XỈU";
                document.getElementById('kq').innerText = res;
                document.getElementById('kq').style.color = res === "TÀI" ? "var(--ios-red)" : "var(--ios-blue)";
                document.getElementById('log').innerText = "> DATA SYNCED WITH XOC88 SERVER";
            }, 2000);
        }

        function hideAll() { panel.style.display = 'none'; bubble.style.display = 'flex'; }
        bubble.addEventListener('touchstart', () => { panel.style.display = 'block'; bubble.style.display = 'none'; });

        // FIX LỖI DI CHUYỂN TRÊN ĐIỆN THOẠI (Kéo được cả 2 menu)
        function makeDraggable(el) {
            let startX, startY, origX, origY;
            el.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                origX = el.offsetLeft; origY = el.offsetTop;
            });
            el.addEventListener('touchmove', (e) => {
                e.preventDefault();
                el.style.left = (origX + e.touches[0].clientX - startX) + 'px';
                el.style.top = (origY + e.touches[0].clientY - startY) + 'px';
            });
        }
        makeDraggable(bubble);
        makeDraggable(panel);
    </script>
</body>
</html>
