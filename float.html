<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass - MD5 Oracle</title>
    <style>
        :root { --ios-blue: #0A84FF; --ios-red: #FF453A; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #target-web { width: 100%; height: 100%; border: none; filter: brightness(0.7); }

        /* BONG BÓNG LIQUID */
        #bubble {
            position: fixed; top: 120px; left: 20px;
            width: 58px; height: 58px; background: rgba(40, 40, 45, 0.4);
            backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 50%; z-index: 10000; border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        /* MENU CHÍNH (LIQUID GLASS) */
        #admin-panel {
            position: fixed; top: 15vh; left: 5vw; width: 90vw; max-width: 330px;
            background: rgba(25, 25, 30, 0.55); backdrop-filter: blur(50px) saturate(210%);
            -webkit-backdrop-filter: blur(50px) saturate(210%); border-radius: 38px;
            padding: 25px; color: white; z-index: 9999; display: none; touch-action: none;
            border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 20px; pointer-events: none; }
        .title { font-size: 14px; font-weight: 900; letter-spacing: 0.5px; color: rgba(255,255,255,0.9); }

        /* KHU VỰC NHẬP LIỆU */
        .glass-card { background: rgba(255,255,255,0.06); border-radius: 22px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.08); }
        .label { font-size: 10px; color: #aaa; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }

        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.1);
            color: #32D74B; font-family: 'Courier New', monospace; font-size: 13px; padding: 12px;
            border-radius: 15px; outline: none; box-sizing: border-box; text-align: center;
        }

        .slots { display: flex; gap: 10px; }
        .slot {
            flex: 1; height: 44px; border-radius: 14px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); color: #777; font-weight: 800;
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .slot.tai { background: rgba(255, 69, 58, 0.25); color: var(--ios-red); border-color: var(--ios-red); }
        .slot.xiu { background: rgba(10, 132, 255, 0.25); color: var(--ios-blue); border-color: var(--ios-blue); }

        /* KẾT QUẢ */
        .result-box { text-align: center; margin: 15px 0; min-height: 90px; }
        #res-val { font-size: 52px; font-weight: 900; letter-spacing: 4px; display: none; }
        #res-rate { font-size: 13px; color: #32D74B; display: none; font-weight: 600; }
        #ai-log { font-size: 10px; color: #8e8e93; font-family: monospace; line-height: 1.4; }

        /* BUTTONS */
        .btn { width: 100%; padding: 16px; border-radius: 22px; border: none; font-weight: 900; font-size: 15px; cursor: pointer; }
        .btn-primary { background: white; color: black; margin-top: 10px; }
        .btn-hide { background: rgba(255,255,255,0.12); color: white; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <iframe id="target-web" src="about:blank"></iframe>

    <div id="bubble"><img src="https://cdn-icons-png.flaticon.com/512/2115/2115916.png" width="30" style="filter: invert(1);"></div>

    <div id="liquid-panel">
        <div class="header">
            <div class="title">MD5 AI ORACLE v26.4</div>
            <div style="color: #32D74B; font-size: 10px;">ONLINE</div>
        </div>

        <div class="glass-card">
            <div class="label">MÃ MD5 (CHUỖI TỪ NHÀ CÁI)</div>
            <input type="text" id="input-md5" placeholder="Dán mã MD5 tại đây..." spellcheck="false">
        </div>

        <div class="glass-card">
            <div class="label">DỮ LIỆU CẦU GẦN NHẤT</div>
            <div class="slots">
                <div class="slot" onclick="sel(this)">-</div>
                <div class="slot" onclick="sel(this)">-</div>
                <div class="slot" onclick="sel(this)">-</div>
            </div>
        </div>

        <div class="result-box">
            <div id="ai-log">Ready to inject...</div>
            <div id="res-val">---</div>
            <div id="res-rate">Xác suất: 0%</div>
        </div>

        <button class="btn btn-primary" onclick="processMD5()">GIẢI MÃ & PHÂN TÍCH</button>
        <button class="btn btn-hide" onclick="ui(false)">THU NHỎ</button>
    </div>

    <script>
        const panel = document.getElementById('liquid-panel'), bubble = document.getElementById('bubble');

        function sel(el) {
            el.innerText = el.innerText === "-" ? "TÀI" : el.innerText === "TÀI" ? "XỈU" : "-";
            el.className = "slot " + (el.innerText === "TÀI" ? "tai" : el.innerText === "XỈU" ? "xiu" : "");
        }

        function processMD5() {
            const md5 = document.getElementById('input-md5').value.trim();
            const slots = document.querySelectorAll('.slot');
            const log = document.getElementById('ai-log'), res = document.getElementById('res-val'), rate = document.getElementById('res-rate');

            if (md5.length < 5) return alert("Mã MD5 không hợp lệ!");
            let history = ""; slots.forEach(s => history += s.innerText);
            if (history.includes("-")) return alert("Vui lòng nhập 3 cầu!");

            // Bắt đầu hiệu ứng
            res.style.display = 'none'; rate.style.display = 'none';
            log.innerText = "> Đang tách hạt giống MD5...";
            
            setTimeout(() => { log.innerText = "> Phân tích 5 ký tự cuối: " + md5.slice(-5).toUpperCase(); }, 800);
            
            setTimeout(() => {
                log.innerText = "> Đối chiếu ma trận lịch sử: " + history;
                
                // THUẬT TOÁN ĐỊNH DANH MD5 (Không ngẫu nhiên)
                // Lấy tổng giá trị ASCII của MD5 + chuỗi cầu
                const combined = md5.toLowerCase() + history;
                let seed = 0;
                for(let i=0; i<combined.length; i++) seed += combined.charCodeAt(i);
                
                // Kết quả cố định theo MD5
                const isTai = seed % 2 === 0;
                const accuracy = (seed % 15) + 80; // Độ chính xác giả lập 80-95%

                res.innerText = isTai ? "TÀI" : "XỈU";
                res.style.color = isTai ? "var(--ios-red)" : "var(--ios-blue)";
                rate.innerText = "Độ tin cậy AI: " + accuracy + "%";
                
                res.style.display = 'block';
                rate.style.display = 'block';
                log.innerText = "> KẾT QUẢ ĐÃ ĐƯỢC GIẢI MÃ";
            }, 2000);
        }

        function ui(s) { panel.style.display = s?'block':'none'; bubble.style.display = s?'none':'flex'; }
        bubble.addEventListener('touchstart', () => ui(true));

        function drag(el) {
            let x, y, ox, oy;
            el.addEventListener('touchstart', e => {
                if(e.target.tagName === 'INPUT') return;
                x = e.touches[0].clientX; y = e.touches[0].clientY;
                ox = el.offsetLeft; oy = el.offsetTop;
            });
            el.addEventListener('touchmove', e => {
                if(e.target.tagName === 'INPUT') return;
                e.preventDefault();
                el.style.left = (ox + e.touches[0].clientX - x) + 'px';
                el.style.top = (oy + e.touches[0].clientY - y) + 'px';
            }, { passive: false });
        }
        drag(bubble); drag(panel);
        ui(false);
    </script>
</body>
</html>
