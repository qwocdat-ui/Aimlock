<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26.4 - Admin Panel Proxy</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --glass: rgba(15, 15, 15, 0.98);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #target-web { width: 100%; height: 100%; border: none; }

        /* BONG BÓNG TRÒN (Messenger Style) */
        #bubble {
            position: fixed; top: 150px; right: 10px;
            width: 55px; height: 55px; background: linear-gradient(135deg, #007AFF, #00C6FF);
            border-radius: 50%; z-index: 10000; cursor: move;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid #fff;
        }

        /* BẢNG ĐIỀU KHIỂN ADMIN (Ẩn mặc định) */
        #admin-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: var(--glass); border-radius: 35px;
            padding: 25px; color: white; z-index: 10001; display: none;
            border: 0.5px solid rgba(255,255,255,0.2); box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        /* GIAO DIỆN THẬT 100% */
        .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .live-dot { width: 10px; height: 10px; background: #32D74B; border-radius: 50%; box-shadow: 0 0 10px #32D74B; }
        
        .monitor-box { background: #000; border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .session-info { font-family: monospace; color: #8e8e93; font-size: 11px; margin-bottom: 10px; }
        .big-res { font-size: 50px; font-weight: 900; text-align: center; }

        /* THANH ĐIỀU CHỈNH ĐỒNG BỘ ẨN */
        .sync-tool { display: flex; gap: 5px; margin-top: 10px; }
        .sync-btn { background: #1c1c1e; color: #fff; border: 1px solid #444; padding: 5px; font-size: 10px; border-radius: 5px; flex: 1; }

        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 15px; border-radius: 20px; font-weight: 800; }
        .btn-close { background: #FF453A; margin-top: 10px; }
        
        /* HIỆU ỨNG QUÉT */
        #scanner { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: var(--ios-blue); box-shadow: 0 0 20px var(--ios-blue); display: none; z-index: 9999; }
    </style>
</head>
<body>

    <iframe id="target-web" src="https://play.xoc88.cc/?code=null"></iframe>
    <div id="scanner"></div>

    <div id="bubble" onclick="openPanel()">
        <img src="https://cdn-icons-png.flaticon.com/512/3039/3039462.png" width="30" style="filter: invert(1);">
    </div>

    <div id="admin-panel">
        <div class="admin-header">
            <div><span class="live-dot"></span> <span style="font-size: 14px; font-weight: bold; margin-left: 5px;">ADMIN CONTROL</span></div>
            <div style="font-size: 12px; color: #8e8e93;">iOS v26.4</div>
        </div>

        <div class="monitor-box">
            <div class="session-info">
                DATABASE: CONNECTED<br>
                SESSION: #<span id="session-num">829441</span><br>
                REMAINING: <span id="time-num">60</span>s
            </div>
            <div class="big-res" id="prediction">---</div>
            <div style="text-align: center; color: #32D74B; font-size: 12px;" id="rate-val">Analyzing...</div>
        </div>

        <div style="font-size: 9px; color: #444; margin-bottom: 5px;">SYNC TOOLS (ẨN TRƯỚC BẠN BÈ)</div>
        <div class="sync-tool">
            <button class="sync-btn" onclick="adjustTime(1)">+1s</button>
            <button class="sync-btn" onclick="adjustTime(-1)">-1s</button>
            <button class="sync-btn" onclick="adjustSession(1)">+1 Phiên</button>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-main" onclick="startScan()">QUÉT DỮ LIỆU THỜI GIAN THỰC</button>
            <button class="btn-main btn-close" onclick="closePanel()">THU NHỎ (GHOST MODE)</button>
        </div>
    </div>

    <script>
        let time = 60;
        let session = 829441;
        let isPanelOpen = false;

        // 1. CHẠY THỜI GIAN
        setInterval(() => {
            time--;
            if (time < 0) {
                time = 60;
                session++;
                document.getElementById('prediction').innerText = "---";
                document.getElementById('prediction').style.color = "#fff";
            }
            document.getElementById('time-num').innerText = time;
            document.getElementById('session-num').innerText = session;
        }, 1000);

        // 2. CÁC HÀM ĐIỀU CHỈNH ĐỒNG BỘ
        function adjustTime(val) { time += val; }
        function adjustSession(val) { session += val; }

        // 3. ĐIỀU KHIỂN BẢNG
        function openPanel() {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('bubble').style.display = 'none';
        }
        function closePanel() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('bubble').style.display = 'flex';
        }

        // 4. QUÉT MÀN HÌNH (EFFECT)
        function startScan() {
            const scan = document.getElementById('scanner');
            const rate = document.getElementById('rate-val');
            const res = document.getElementById('prediction');
            
            scan.style.display = 'block';
            scan.animate([{ top: '0%' }, { top: '100%' }], { duration: 2000, iterations: 1 });
            
            rate.innerText = "EXTRACTING DATA FROM SCREEN...";
            
            setTimeout(() => {
                scan.style.display = 'none';
                const win = Math.random() > 0.5;
                res.innerText = win ? "TÀI" : "XỈU";
                res.style.color = win ? "var(--ios-red)" : "var(--ios-blue)";
                rate.innerText = "ACCURACY: " + (Math.floor(Math.random()*10)+89) + "%";
            }, 2000);
        }

        // 5. KÉO THẢ BONG BÓNG VÀ BẢNG
        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;
            function dragMouseDown(e) {
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            function elementDrag(e) {
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                elmnt.style.transform = "none"; // Bỏ transform translate khi kéo
            }
            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
            }
        }
        dragElement(document.getElementById("bubble"));
        dragElement(document.getElementById("admin-panel"));
    </script>
</body>
</html>
